#Kotlin
kotlin.code.style=official
# Needed so IntelliJ can resolve cinterop-generated declarations (e.g. the
# nativeFormat cinterop) referenced from iosMain, which is an intermediate
# source set shared by iosArm64/iosSimulatorArm64. Without this, per-target
# Gradle compiles still succeed (each target compiles iosMain directly
# against its own cinterop klib) but the IDE has no commonized cinterop
# view to resolve against, so it shows unresolved/red errors.
kotlin.mpp.enableCInteropCommonization=true
kotlin.daemon.jvmargs=-Xmx3072M
#Gradle
org.gradle.jvmargs=-Xmx4096M -Dfile.encoding=UTF-8
org.gradle.configuration-cache=true
org.gradle.caching=true
#Android
android.nonTransitiveRClass=true
android.useAndroidX=true